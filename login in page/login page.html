<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> login | Infosys Springboard</title>
    <link rel="stylesheet" href="login page.css">
    <link rel="icon" href="../Images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="box">
        <img src="landing.png" alt="logo" class="logo">

        <div class="overlay">

            <div class="email">
                <span class="content">Email</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
                <span> Phone </span>
            </div>

            <!-- Email -->
            <div class="input-box">
                <i class="fa fa-envelope"></i>
                <input type="search" placeholder="Enter your registered email id">
            </div>

            <div class="otp">
                <input type="checkbox">
                <label>Log in with OTP</label>
            </div>

            <!-- Password -->
            <label class="label">Password</label>
            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" placeholder="Enter your password">
            </div>

            <div class="forget">
                <a href="../sign with google/SIGNIN GOOGLE.HTML"> Forget Password? </a>
                <div>
                    <input type="checkbox">
                    <span>Remember me</span>
                </div>
            </div>
            <!-- login -->
            <button class="login"><a href="../second main page/second main page.html">Log In</a></button>

            <!-- line -->
            <div class="line">
                <span></span>
                <p>OR</p>
                <span></span>
            </div>

            <!-- Social -->
            <div class="social"><a href="../sign with google/SIGNIN GOOGLE.HTML">
                    <button class="google">
                        <img src="https://img.icons8.com/color/16/google-logo.png">
                        Login with Google
                    </button></a>

                <a href="#"> <button class="partner">
                        Login with partner portal <i class="fa fa-caret-down"></i>
                    </button></a>
            </div>

            <div class="line">
                <span> </span>
            </div>

            <!-- <hr> -->

            <!-- Footer -->
            <div class="footer">
                <a href="#">Generate your password</a>
                <p>New user? <a href="../1 register page age verification/1 reg page .html">Register</a></p>
            </div>


        </div>

    </div>

</body>

</html>
